<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Najisa | Portfolio</title>
    <style>
        /* 1. 基础重置 */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            transition: background-color 0.8s ease;
        }
        
        /* 2. 背景与层级 */
        .bg-container, .top-container, #universe { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh; 
            transition: filter 0.6s ease;
        }
        .mesh-layer, .top-layer { position: absolute; width: 100%; height: 100%; top: 0; left: 0; background-size: cover; background-position: center; transition: opacity 1s ease; }
        .mesh-layer { animation: meshBreathe 12s infinite ease-in-out; }
        @keyframes meshBreathe { 0%, 100% { transform: scale(1.1); } 50% { transform: scale(1.25); } }

        .dark-bg { background-image: url('./images/bg-dark.png'); opacity: 1; }
        .light-bg { background-image: url('./images/bg-light.png'); opacity: 0; }
        .top-dark { background-image: url('./images/top-dark.png'); opacity: 1; z-index: 10; }
        .top-light { background-image: url('./images/top-light.png'); opacity: 0; z-index: 10; }
        .light-mode .dark-bg, .light-mode .top-dark { opacity: 0; }
        .light-mode .light-bg, .light-mode .top-light { opacity: 1; }

        body.menu-open .bg-container, body.menu-open #universe, body.menu-open .top-container, body.menu-open .hero-container {
            filter: blur(2px); 
            pointer-events: none;
        }

        /* 3. 灯绳系统 (lamp-toggle) */
        .lamp-toggle {
            position: fixed; top: 0; left: 0; width: 200px; height: 65vh; z-index: 4000;
            transform: scale(0.7); transform-origin: top center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .click-mask {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; cursor: pointer;
        }

        .layer-part { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-size: contain; background-repeat: no-repeat; background-position: center top; 
            transition: opacity 0.1s steps(1); 
            pointer-events: none; 
        }
        
        .eye-dark { background-image: url('./images/eye-dark.png'); }
        .eye-light { background-image: url('./images/eye-light.png'); }
        .line-dark { background-image: url('./images/line-dark.png'); }
        .line-light { background-image: url('./images/line-light.png'); }
        .han-dark { background-image: url('./images/han-dark.png'); }
        .han-light { background-image: url('./images/han-light.png'); }

        .line-group, .han-group { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: top center; transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .lamp-toggle:hover .line-group { transform: scaleY(1.02); }
        .lamp-toggle:hover .han-group { transform: translateY(10px); }

        .lamp-toggle:active .eye-dark, .lamp-toggle:active .eye-light { transform: scaleY(1.1) scaleX(0.92); transform-origin: top center; transition: transform 0.1s ease-out; }
        .lamp-toggle:active .line-group { transform: scaleY(1.02) translateY(8px); transition: transform 0.1s ease-out; }
        .lamp-toggle:active .han-group { transform: translateY(17px); transition: transform 0.1s ease-out; }

        .eye-light, .line-light, .han-light { opacity: 0; }
        .light-mode .eye-dark, .light-mode .line-dark, .light-mode .han-dark { opacity: 0; }
        .light-mode .eye-light, .light-mode .line-light, .light-mode .han-light { opacity: 1; }

        /* 4. 中心排版 */
        .hero-container {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 9997; pointer-events: none; width: 100%;
        }
        .main-title {
            pointer-events: auto; color: white; font-size: 150px; letter-spacing: 50px; 
            margin: 0; padding-left: 50px; font-weight: 100; cursor: pointer; text-decoration: none;
            transition: opacity 0.5s ease, color 0.8s ease; line-height: 1.1;
        }
        .description { color: rgba(255, 255, 255, 0.6); font-size: 14px; letter-spacing: 6px; text-transform: uppercase; margin: 20px 0 60px 0; font-weight: 300; }
        .sub-nav { pointer-events: auto; display: flex; justify-content: center; gap: 60px; }
        .nav-item { color: white; text-decoration: none; font-size: 14px; letter-spacing: 6px; text-transform: uppercase; position: relative; transition: color 0.8s ease; }
        .nav-item::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 1px; background: white; transition: width 0.3s ease; }
        .nav-item:hover::after { width: calc(100% - 6px); }

        /* 5. 侧滑菜单 (0.03透明) */
        .menu-overlay {
            position: fixed; top: 0; right: -450px; width: 400px; height: 100%;
            background: rgba(0, 0, 0, 0.03); 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 9998; display: flex; flex-direction: column; justify-content: center;
            padding-left: 60px; padding-bottom: 25vh; box-sizing: border-box;
            transition: right 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -20px 0 50px rgba(0, 0, 0, 0.5); border-left: 1px solid rgba(255, 255, 255, 0.05);
        }
        .menu-overlay.active { right: 0; }
        .menu-links { display: flex; flex-direction: column; gap: 40px; }
        .menu-link {
            color: white; text-decoration: none; font-size: 32px; font-weight: 200;
            letter-spacing: 10px; text-transform: uppercase; position: relative; 
            display: inline-block; width: fit-content; transition: opacity 0.4s ease;
            opacity: 0; transform: translateX(30px);
        }
        .menu-overlay.active .menu-link { opacity: 1; transform: translateX(0); }
        .menu-link::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 1px; background: white; transition: width 0.3s ease; }
        .menu-link:hover::after { width: calc(100% - 10px); }
        .menu-link:hover { opacity: 0.7; }

        .menu-footer { position: absolute; bottom: 60px; color: rgba(255, 255, 255, 0.3); font-size: 10px; line-height: 2; letter-spacing: 3px; text-transform: uppercase; }

        /* 亮色适配 */
        .light-mode .main-title, .light-mode .nav-item, .light-mode .menu-link { color: black; }
        .light-mode .description, .light-mode .menu-footer { color: rgba(0, 0, 0, 0.4); }
        .light-mode .nav-item::after, .light-mode .menu-link::after { background-color: black; }
        .light-mode .menu-overlay { background: rgba(255, 255, 255, 0.1); border-left: 1px solid rgba(0, 0, 0, 0.05); }

        /* 6. 汉堡按钮 */
        .top-right-util { position: fixed; top: 45px; right: 55px; z-index: 9999; }
        .burger-icon { width: 30px; height: 14px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
        .burger-icon span { width: 100%; height: 2px; background: white; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .burger-icon:not(.active):hover span:first-child { width: 80%; }
        .burger-icon:not(.active):hover span:last-child { width: 80%; transform: translateX(8px); }
        .burger-icon.active span:first-child { transform: translateY(6px) rotate(45deg); width: 100%; }
        .burger-icon.active span:last-child { transform: translateY(-6px) rotate(-45deg); width: 100%; }
        .light-mode .burger-icon span { background-color: black; }
    </style>
</head>
<body>

<div class="menu-overlay" id="menuOverlay">
    <nav class="menu-links">
        <a href="works.html" class="menu-link">Work</a>
        <a href="about.html" class="menu-link">About</a>
        <a href="./assets/Najisa_Resume.pdf" class="menu-link" download>Resume</a>
        <a href="contact.html" class="menu-link">Contact</a>
    </nav>
    <div class="menu-footer"><p>Based in New York | Media & Computational Design</p></div>
</div>

<div class="lamp-toggle" id="lampControl">
    <div class="click-mask" id="clickMask"></div>
    <div class="layer-part eye-dark"></div>
    <div class="layer-part eye-light"></div>
    <div class="line-group">
        <div class="layer-part line-dark"></div>
        <div class="layer-part line-light"></div>
    </div>
    <div class="han-group">
        <div class="layer-part han-dark"></div>
        <div class="layer-part han-light"></div>
    </div>
</div>

<div class="bg-container">
    <div class="mesh-layer dark-bg"></div><div class="mesh-layer light-bg"></div>
</div>

<canvas id="universe"></canvas>

<div class="top-container">
    <div class="top-layer top-dark"></div><div class="top-layer top-light"></div>
</div>

<div class="top-right-util">
    <div class="burger-icon" id="burger"><span></span><span></span></div>
</div>

<div class="hero-container">
    <h1 class="main-title" onclick="location.reload()">ABOUT</h1>
    <div class="description">Digital Artist | Media & Computational Designer</div>
    <nav class="sub-nav">
        <a href="works.html" class="nav-item">Work</a>
        <a href="about.html" class="nav-item">About</a>
        <a href="./assets/Najisa_Resume.pdf" class="nav-item" download>Resume</a>
        <a href="contact.html" class="nav-item">Contact</a>
    </nav>
</div>

<script>
    const clickMask = document.getElementById('clickMask');
    // 🚀 初始化：检查 sessionStorage
    let isLightMode = sessionStorage.getItem('portfolio-mode') === 'light';
    let colorTransition = isLightMode ? 1 : 0; 

    // 如果存的是 light，加载时立即应用
    if (isLightMode) {
        document.body.classList.add('light-mode');
    }

    // 🚀 核心点击逻辑
    clickMask.onclick = function(e) {
        const rect = this.getBoundingClientRect();
        const relativeY = e.clientY - rect.top;
        const percentY = (relativeY / rect.height) * 100;

        if (percentY <= 20) {
            // 20% 之上（眼睛）-> 回主页
            window.location.href = 'index.html';
        } else {
            // 20% 之下（绳子和手柄）-> 切换昼夜
            isLightMode = !isLightMode;
            document.body.classList.toggle('light-mode', isLightMode);
            
            // 🚀 保存到会话存储（刷新会消失，跳转会保留）
            sessionStorage.setItem('portfolio-mode', isLightMode ? 'light' : 'dark');
        }
    };

    // --- 宇宙逻辑 ---
    const canvas = document.getElementById('universe');
    const ctx = canvas.getContext('2d');
    const config = { starCount: 45, particleCount: 45000, baseSize: 40, longAxisRatio: 2.2, sharpness: 0.45, friction: 0.94, ease: 0.06 };
    let v = { x: 0, y: 0, tx: 0, ty: 0 }, lastM = { x: 0, y: 0 };
    const motherCache = { dark: [], light: [] };

    const burger = document.getElementById('burger');
    const menuOverlay = document.getElementById('menuOverlay');
    const menuLinks = document.querySelectorAll('.menu-link');
    burger.onclick = function() {
        this.classList.toggle('active');
        menuOverlay.classList.toggle('active');
        document.body.classList.toggle('menu-open'); 
        if (menuOverlay.classList.contains('active')) {
            menuLinks.forEach((link, index) => { link.style.transitionDelay = `${0.3 + index * 0.1}s`; });
        }
    };

    function createMother(color, blurStr) {
        const mCanvas = document.createElement('canvas');
        const w = config.baseSize * 5, h = w * config.longAxisRatio;
        mCanvas.width = w; mCanvas.height = h;
        const mctx = mCanvas.getContext('2d');
        if (blurStr !== '0px') mctx.filter = `blur(${blurStr})`;
        mctx.fillStyle = color;
        const cx = w/2, cy = h/2;
        for (let i = 0; i < config.particleCount; i++) {
            const rx = (Math.random() - 0.5) * config.baseSize * 4;
            const ry = (Math.random() - 0.5) * config.baseSize * config.longAxisRatio * 2;
            const nx = Math.abs(rx) / config.baseSize, ny = Math.abs(ry) / (config.baseSize * config.longAxisRatio);
            const dist = Math.pow(nx, config.sharpness) + Math.pow(ny, config.sharpness);
            if (dist < 0.8 || (dist < 1.6 && Math.random() < Math.pow(1 - (dist - 0.8) / 0.8, 8))) {
                let pSize = 0.3 + 1.9 * Math.pow(Math.max(0, 1 - dist/1.6), 2);
                mctx.fillRect(cx + rx, cy + ry, pSize, pSize);
            }
        }
        return mCanvas;
    }
    class Star {
        constructor() { this.reset(); this.age = Math.random() * 8000; }
        reset() {
            this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
            const r = Math.random();
            if (r > 0.8) { this.idx = 0; this.sc = 0.45; this.bAmp = 0.35; this.bSpd = 0.005; } 
            else if (r > 0.4) { this.idx = 1; this.sc = 0.28; this.bAmp = 0.15; this.bSpd = 0.012; } 
            else { this.idx = 2; this.sc = 0.15; this.bAmp = 0.05; this.bSpd = 0.02; }
            this.op = 0; this.life = 10000 + Math.random() * 10000; this.age = 0;
            this.bPh = Math.random() * 7; this.tPh = Math.random() * 7;
        }
        update() {
            this.age += 16.6; this.bPh += this.bSpd; this.tPh += 0.05;
            const fade = 2500;
            if (this.age < fade) this.op = this.age / fade;
            else if (this.age > this.life - fade) this.op = (this.life - this.age) / fade;
            else this.op = 1;
            if (this.age >= this.life) this.reset();
        }
        draw(ox, oy) {
            const finalSc = this.sc * (1 + Math.sin(this.bPh) * this.bAmp) * (1 + Math.sin(this.tPh) * 0.1);
            const dx = this.x - (motherCache.dark[this.idx].width * finalSc)/2 + (ox * (2.5 - this.idx));
            const dy = this.y - (motherCache.dark[this.idx].height * finalSc)/2 + (oy * (2.5 - this.idx));
            ctx.globalAlpha = Math.max(0, this.op * (1 - colorTransition));
            ctx.drawImage(motherCache.dark[this.idx], dx, dy, motherCache.dark[this.idx].width * finalSc, motherCache.dark[this.idx].height * finalSc);
            ctx.globalAlpha = Math.max(0, this.op * colorTransition);
            ctx.drawImage(motherCache.light[this.idx], dx, dy, motherCache.light[this.idx].width * finalSc, motherCache.light[this.idx].height * finalSc);
        }
    }
    let stars = [];
    function init() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const blurs = ['0px', '0.6px', '1.8px'];
        motherCache.dark = blurs.map(b => createMother("white", b));
        motherCache.light = blurs.map(b => createMother("black", b));
        stars = Array.from({ length: config.starCount }, () => new Star());
    }
    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        v.tx *= config.friction; v.ty *= config.friction;
        v.x += (v.tx - v.x) * config.ease; v.y += (v.ty - v.y) * config.ease;
        const step = 16.6 / 1000;
        // 🚀 同步渐变变量
        if (isLightMode && colorTransition < 1) colorTransition = Math.min(1, colorTransition + step);
        if (!isLightMode && colorTransition > 0) colorTransition = Math.max(0, colorTransition - step);
        stars.forEach(s => { s.update(); s.draw(v.x, v.y); });
        requestAnimationFrame(loop);
    }
    window.addEventListener('mousemove', (e) => {
        if (lastM.x !== 0) { v.tx += (e.clientX - lastM.x) * 0.5; v.ty += (e.clientY - lastM.y) * 0.5; }
        lastM.x = e.clientX; lastM.y = e.clientY;
    });
    window.addEventListener('resize', init);
    init(); loop();
</script>
</body>
</html>
