<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Works | Najisa</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/works.css">
</head>
<body>

<div class="menu-overlay" id="menuOverlay">    
    <nav class="menu-links">
        <a href="works.html" class="menu-link current-page">Work</a>
        <a href="about.html" class="menu-link">About</a>
        <a href="resume.html" class="menu-link">Resume</a>
        <a href="contact.html" class="menu-link">Contact</a>
    </nav>
    <div class="menu-footer"><p>Based in New York | Media & Computational Design</p></div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <div class="lightbox-content" onclick="event.stopPropagation()">
        <span class="lightbox-close" onclick="closeLightbox()">CLOSE</span>
        <div id="lbMediaContainer" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;"></div>
    </div>
</div>

<div class="lamp-toggle" id="lampControl">
    <div class="click-mask" id="clickMask"></div>
    <div class="layer-part eye-dark"></div><div class="layer-part eye-light"></div>
    <div class="line-group"><div class="layer-part line-dark"></div><div class="layer-part line-light"></div></div>
    <div class="han-group"><div class="layer-part han-dark"></div><div class="layer-part han-light"></div></div>
</div>

<div class="bg-container"><div class="mesh-layer dark-bg"></div><div class="mesh-layer light-bg"></div></div>
<canvas id="universe"></canvas>
<div class="top-container"><div class="top-layer top-dark"></div><div class="top-layer top-light"></div></div>

<div class="top-right-util"><div class="burger-icon" id="burger"><span></span><span></span></div></div>

<div class="works-content-wrapper">
    <aside class="works-sidebar">
        <div class="nav-group">
            <span class="nav-label">Timeline</span>
            <div id="timeNav"></div>
        </div>
        <div class="nav-group">
            <span class="nav-label">Category</span>
            <div id="catNav"></div>
        </div>
    </aside>

<main class="works-slider" id="worksSlider"></main>
<div class="progress-bar-container"><div class="progress-fill" id="progressFill"></div></div>

</div>

<script src="js/global.js"></script>

<script src="js/works-data.js"></script>

<script src="js/works.js"></script>

</body>
</html>
