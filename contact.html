<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Najisa</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        .contact-wrapper { 
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
            width: 100%;
        }

    .contact-label { 
        font-size: 10px;
        letter-spacing: 8px;
        color: rgba(255,255,255,0.4);
        margin-bottom: 80px;
        text-transform: uppercase;
        font-weight: 300;
    }

    .contact-list {
        display: flex;
        flex-direction: column;
        gap: 40px;
    }

    .contact-item { 
        color: white;
        text-decoration: none;
        font-size: 46px;
        font-weight: 100;
        letter-spacing: 15px;
        text-transform: uppercase;
        opacity: 0.25;
        transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
    }

    .contact-item:hover {
        opacity: 1;
        letter-spacing: 30px;
        transform: scale(1.05);
    }

    .light-mode .contact-item {
        color: black;
    }

    .light-mode .contact-label {
        color: rgba(0,0,0,0.4);
    }

    .menu-link[href="contact.html"] {
        opacity: 0.4 !important;
        pointer-events: none;
    }

    @media (max-width: 768px) {
        .contact-wrapper {
            padding: 100px 20px 32px;
            box-sizing: border-box;
        }

        .contact-label {
            font-size: 9px;
            letter-spacing: 4px;
            margin-bottom: 36px;
        }

        .contact-list {
            gap: 22px;
        }

        .contact-item {
            font-size: 24px;
            letter-spacing: 6px;
            opacity: 0.45;
        }

        .contact-item:hover {
            letter-spacing: 10px;
            transform: none;
        }
    }
</style>

</head>
<body>

<div class="menu-overlay" id="menuOverlay">
    <nav class="menu-links">
        <a href="works.html" class="menu-link">Work</a>
        <a href="about.html" class="menu-link">About</a>
        <a href="resume.html" class="menu-link">Resume</a>
        <a href="contact.html" class="menu-link">Contact</a>
    </nav>
    <div class="menu-footer"><p>Based in New York | Media & Computational Design</p></div>
</div>

<div class="lamp-toggle" id="lampControl">
    <div class="click-mask" id="clickMask"></div>
    <div class="layer-part eye-dark"></div>
    <div class="layer-part eye-light"></div>
    <div class="line-group">
        <div class="layer-part line-dark"></div>
        <div class="layer-part line-light"></div>
    </div>
    <div class="han-group">
        <div class="layer-part han-dark"></div>
        <div class="layer-part han-light"></div>
    </div>
</div>

<div class="bg-container">
    <div class="mesh-layer dark-bg"></div><div class="mesh-layer light-bg"></div>
</div>

<canvas id="universe"></canvas>

<div class="top-container">
    <div class="top-layer top-dark"></div><div class="top-layer top-light"></div>
</div>

<div class="top-right-util">
    <div class="burger-icon" id="burger"><span></span><span></span></div>
</div>

<main class="contact-wrapper">
    <div class="contact-label">Get in Touch</div>
    <div class="contact-list">
        <a href="mailto:your@email.com" class="contact-item">Email</a>
        <a href="https://instagram.com/yourhandle" target="_blank" class="contact-item">Instagram</a>
        <a href="https://linkedin.com/in/yourprofile" target="_blank" class="contact-item">LinkedIn</a>
    </div>
</main>

<script src="js/global.js"></script>

</body>
</html>
